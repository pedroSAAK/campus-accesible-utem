<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Accesible - UTEM Ñuñoa</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --bg-principal: #f4f7f6; --bg-panel: #ffffff; --text-color: #2b2b2b;
            --navbar-bg: #002b5e; --navbar-text: #ffffff;
            --btn-focus-ring: 0 0 0 0.3rem rgba(0, 123, 255, 0.5); --borde-tarjeta: #e0e0e0;
        }
        body.alto-contraste {
            --bg-principal: #121212; --bg-panel: #000000; --text-color: #ffff00;
            --navbar-bg: #000000; --navbar-text: #ffff00;
            --btn-focus-ring: 0 0 0 0.4rem #ffff00; --borde-tarjeta: #ffff00;
        }

        body { height: 100vh; display: flex; flex-direction: column; margin: 0; background-color: var(--bg-principal); color: var(--text-color); font-size: 16px; transition: font-size 0.3s, background-color 0.3s; }
        a:focus, button:focus, input:focus, select:focus { outline: none !important; box-shadow: var(--btn-focus-ring) !important; }
        .navbar { background-color: var(--navbar-bg) !important; color: var(--navbar-text); border-bottom: 4px solid #00a499; }
        #contenedor-principal { height: calc(100vh - 70px); display: flex; overflow: hidden; }
        #panel-control { width: 420px; background: var(--bg-panel); box-shadow: 4px 0 15px rgba(0,0,0,0.05); z-index: 1000; overflow-y: auto; padding: 1.5rem; transition: background-color 0.3s; }
        #mapa { flex-grow: 1; height: 100%; z-index: 1; background-color: #e5e5e5; }
        
        .tarjeta-herramienta { background-color: transparent; border: 1px solid var(--borde-tarjeta); border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .btn-accesible { border-radius: 8px; font-weight: 600; padding: 12px; text-align: left; display: flex; align-items: center; gap: 10px; transition: all 0.2s ease; border-width: 2px; }
        .btn-accesible:hover { transform: translateY(-2px); }
        
        .icono-mapa { font-size: 24px; text-align: center; line-height: 38px; background: white; border-radius: 50%; border: 3px solid #002b5e; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        .icono-m2 { border-color: #00a499; background: #002b5e; color: white; transform: scale(1.1); }
        .icono-rojo { border-color: #dc3545; background: #fff3f3; }
        .icono-verde { border-color: #198754; background: #f0fdf4; }

        .leaflet-popup-content-wrapper { padding: 0; overflow: hidden; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); width: 320px; }
        .leaflet-popup-content { margin: 0; width: 100% !important; }
        .edificio-card { border: none; width: 100%; }
        .edificio-card img { width: 100%; height: 180px; object-fit: cover; border-bottom: 3px solid #00a499; }
        .edificio-card-body { padding: 1rem; text-align: center; }
        .edificio-card-title { font-size: 1.1rem; font-weight: 700; color: #002b5e; margin-bottom: 0.25rem; }
        .edificio-card-text { font-size: 0.85rem; color: #6c757d; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg px-4" role="banner">
        <div class="d-flex align-items-center gap-3">
            <span class="fs-4 fw-bold text-white"><i class="bi bi-universal-access-circle"></i> Campus Accesible</span>
            <span class="badge bg-light text-dark px-3 py-2 rounded-pill border border-dark">Sede Ñuñoa</span>
        </div>
        <div class="ms-auto d-flex gap-2">
            <button onclick="cambiarTamanoTexto(1)" class="btn btn-outline-light fw-bold" aria-label="Aumentar tamaño de letra">A+</button>
            <button onclick="cambiarTamanoTexto(-1)" class="btn btn-outline-light fw-bold" aria-label="Disminuir tamaño de letra">A-</button>
            <button onclick="toggleAltoContraste()" class="btn btn-warning fw-bold text-dark"><i class="bi bi-circle-half"></i> Contraste</button>
            <button onclick="leerPantalla()" class="btn btn-info fw-bold text-dark"><i class="bi bi-megaphone-fill"></i> Voz</button>
        </div>
    </nav>

    <main id="contenedor-principal">
        <aside id="panel-control" role="complementary" aria-label="Panel de navegación e interacción">
            
            <div class="tarjeta-herramienta">
                <label for="buscador" class="form-label fw-bold"><i class="bi bi-search"></i> Buscador Espacial</label>
                <div class="input-group mb-3">
                    <input type="text" id="buscador" class="form-control form-control-lg" placeholder="Ej: Sala M2-202, Biblioteca..." onkeypress="if(event.key === 'Enter') buscarEspacio()">
                    <button class="btn btn-primary px-4" onclick="buscarEspacio()">Buscar</button>
                </div>

                <label class="form-label fw-bold mt-3"><i class="bi bi-signpost-split"></i> Trazar Ruta Peatonal</label>
                <div class="mb-3">
                    <div class="input-group mb-2">
                        <span class="input-group-text bg-success text-white fw-bold" style="width: 85px;">Origen</span>
                        <select id="origenRuta" class="form-select"></select>
                    </div>
                    <div class="input-group mb-2">
                        <span class="input-group-text bg-primary text-white fw-bold" style="width: 85px;">Destino</span>
                        <select id="destinoRuta" class="form-select"></select>
                    </div>
                </div>
                <button onclick="trazarRutaInteligente()" class="btn btn-success w-100 fw-bold"><i class="bi bi-cursor-fill"></i> Iniciar Ruta</button>
            </div>

            <div class="tarjeta-herramienta">
                <h6 class="fw-bold mb-3"><i class="bi bi-layers-fill"></i> Filtros de Infraestructura</h6>
                <div class="d-grid gap-2">
                    <button onclick="mostrarTodosLosEdificios()" class="btn btn-outline-dark btn-accesible"><i class="bi bi-building fs-5"></i> Vista General</button>
                    <button onclick="mostrarBanos()" class="btn btn-info text-dark btn-accesible"><i class="bi bi-gender-ambiguous fs-5"></i> Baños Inclusivos</button>
                    <button onclick="mostrarZonasTranquilas()" class="btn btn-success text-white btn-accesible"><i class="bi bi-tree-fill fs-5"></i> Zonas Tranquilas</button>
                </div>
            </div>

            <div class="tarjeta-herramienta border-danger">
                <h6 class="fw-bold text-danger mb-3"><i class="bi bi-gear-fill"></i> Gestión de Sistema</h6>
                <div class="d-grid gap-2">
                    <button onclick="guardarFavorito()" class="btn btn-outline-secondary btn-accesible border-2"><i class="bi bi-star-fill text-warning"></i> Guardar Ruta Habitual</button>
                    <button class="btn btn-danger btn-accesible" data-bs-toggle="modal" data-bs-target="#modalReporte"><i class="bi bi-exclamation-triangle-fill"></i> Reportar Barrera Físíca</button>
                    <button onclick="toggleAscensorAdmin()" class="btn btn-dark text-warning btn-accesible"><i class="bi bi-tools"></i> Admin: Estado Ascensor</button>
                </div>
                <div id="listaFavoritos" class="mt-3 small fw-bold text-primary"></div>
            </div>

        </aside>

        <section id="mapa" role="application" aria-label="Mapa interactivo del campus UTEM"></section>
    </main>

    <div class="modal fade" id="modalReporte" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title"><i class="bi bi-shield-exclamation"></i> Formulario de Reporte</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Describa la barrera arquitectónica:</label>
                        <textarea id="inputReporte" class="form-control" rows="3" placeholder="Ej: Escombros en el pasillo..." required></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-danger px-4" onclick="enviarReporte()">Enviar Alerta</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-4">
        <div id="toastNotificacion" class="toast align-items-center border-0 shadow-lg" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body fw-bold fs-6 text-white" id="toastMensaje">Notificación.</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

            },
            conexiones: {

                'sur_m2': ['sur_m1', 'p_m2', 'p_gim', 'sur_m3', 'p_sesaes'], 
                'sur_m3': ['sur_m2', 'p_m3', 'p_m8', 'p_parque'],

            ],

            // REGRESO DE LA BASE DE DATOS COMPLETA DE LAS SALAS PARA EL BUSCADOR
            salas: [
                { id: 'm2-201', nombre: 'Sala M2-201', lat: -33.466230, lng: -70.597722, desc: '2do Piso Sur', icono: '🚪' },
                { id: 'm2-202', nombre: 'Sala M2-202', lat: -33.466180, lng: -70.597722, desc: '2do Piso Centro-Sur', icono: '🚪' },

        function crearContenidoPopup(nombre, foto) {
            return `
                <div class="card edificio-card shadow-sm rounded">
                    <img src="${foto}" class="card-img-top img-fluid rounded-top" onerror="this.src='img/placeholder_campus.jpg'; this.onerror=null;">
                    <div class="edificio-card-body p-3 text-center">
                        <h6 class="edificio-card-title fw-bold" style="color: #002b5e;">${nombre}</h6>
                        <p class="edificio-card-text small text-muted">Campus Ñuñoa, UTEM</p>
                    </div>
                </div>
            `;
        }

        document.addEventListener('DOMContentLoaded', function() {
            try {
                map = L.map('mapa', { zoomControl: false }).setView(coordsCampus, 18);
                L.control.zoom({ position: 'bottomright' }).addTo(map);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 22, maxNativeZoom: 19, attribution: '© UTEM Accesible' }).addTo(map);
                capaDinamica = L.layerGroup().addTo(map);
                
                setTimeout(() => { map.invalidateSize(); mostrarTodosLosEdificios(); }, 500);

                inicializarSelectores(); cargarFavoritos();
                if ('speechSynthesis' in window) { window.speechSynthesis.onvoiceschanged = optimizarVozHumana; optimizarVozHumana(); }
            } catch (error) { console.error("Error JS:", error); }
        });

        function cambiarTamanoTexto(cambio) {
            tamanoLetraActual += (cambio * 2);
            if(tamanoLetraActual < 14) tamanoLetraActual = 14; if(tamanoLetraActual > 24) tamanoLetraActual = 24;
            document.body.style.fontSize = tamanoLetraActual + 'px';
            hablar("Tamaño ajustado.");
        }

        function toggleAltoContraste() {
            document.body.classList.toggle('alto-contraste');
            const on = document.body.classList.contains('alto-contraste');
            mostrarToast(on ? "Modo Alto Contraste Activado" : "Modo Normal Restaurado", "bg-dark");
            hablar(on ? "Alto contraste activado." : "Modo normal.");
        }

        function inicializarSelectores() {
            const org = document.getElementById('origenRuta'), dst = document.getElementById('destinoRuta');
            org.innerHTML = ''; dst.innerHTML = '';
            for (const key in edificiosCampus) {
                org.add(new Option(edificiosCampus[key].nombre, key));
                dst.add(new Option(edificiosCampus[key].nombre, key));
            }
            org.value = 'entrada_alessandri'; dst.value = 'biblioteca';
        }

        function buscarRutaGrafo(inicio, objetivo) {
            let cola = [[inicio]]; let visitados = new Set();
            while (cola.length > 0) {
                let ruta = cola.shift(); let nodoActual = ruta[ruta.length - 1];
                if (nodoActual === objetivo) return ruta;
                if (!visitados.has(nodoActual)) {
                    visitados.add(nodoActual);
                    let vecinos = redNavegacion.conexiones[nodoActual] || [];
                    for (let vec of vecinos) cola.push([...ruta, vec]);
                }
            } return null;
        }

        function trazarRutaInteligente() {
            capaDinamica.clearLayers();
            const idOrg = document.getElementById('origenRuta').value, idDst = document.getElementById('destinoRuta').value;
            if (idOrg === idDst) return mostrarToast("Origen y destino idénticos.", "bg-warning text-dark");

            const rutaIds = buscarRutaGrafo(idOrg, idDst);
            if (rutaIds) {
                const coords = rutaIds.map(id => edificiosCampus[id] ? [edificiosCampus[id].lat, edificiosCampus[id].lng] : [redNavegacion.nodos[id].lat, redNavegacion.nodos[id].lng]);
                
                const linea = L.polyline(coords, { 
                    color: '#0d6efd', weight: 6, opacity: 0.8, lineJoin: 'round', dashArray: '12, 12' 
                }).addTo(capaDinamica);
                
                L.marker(coords[0], {icon: L.divIcon({html: '🛫', className: 'icono-mapa icono-verde', iconSize: [35,35]})})
                    .addTo(capaDinamica)
                    .bindPopup(crearContenidoPopup(`Origen: ${edificiosCampus[idOrg].nombre}`, edificiosCampus[idOrg].foto)).openPopup();

                L.marker(coords[coords.length-1], {icon: L.divIcon({html: '🏁', className: 'icono-mapa icono-m2', iconSize: [40,40]})})
                    .addTo(capaDinamica)
                    .bindPopup(crearContenidoPopup(`Destino: ${edificiosCampus[idDst].nombre}`, edificiosCampus[idDst].foto));
                
                map.flyToBounds(linea.getBounds(), { padding: [80, 80], maxZoom: 19, duration: 1.5 });
                mostrarToast("Ruta trazada.", "bg-success");
                hablar(`Ruta calculada hacia ${edificiosCampus[idDst].nombre}.`);
            }
        }

        function buscarEspacio() {
            const term = document.getElementById('buscador').value.toLowerCase().trim(); if(!term) return;
            const sala = datosInfra.salas.find(s => s.id.includes(term) || s.nombre.toLowerCase().includes(term));
            const idEdif = Object.keys(edificiosCampus).find(k => k.includes(term) || edificiosCampus[k].nombre.toLowerCase().includes(term));

            if(sala) {
                dibujarPuntos([sala], 'icono-verde', `Ubicando: ${sala.nombre}`, 'bg-primary');
                map.flyTo([sala.lat, sala.lng], 21, {duration: 1.5});
                hablar(`${sala.nombre} localizada.`);
            } else if (idEdif) {
                capaDinamica.clearLayers(); const e = edificiosCampus[idEdif];
                L.marker([e.lat, e.lng], {icon: L.divIcon({html: e.icon || '🏢', className: 'icono-mapa icono-m2', iconSize:[45,45]})})
                    .addTo(capaDinamica)
                    .bindPopup(crearContenidoPopup(e.nombre, e.foto))
                    .openPopup();
                map.flyTo([e.lat, e.lng], 20, {duration: 1.5});
                mostrarToast(`${e.nombre} localizado.`, "bg-success");
            } else mostrarToast("No encontrado.", "bg-warning text-dark");
        }

        function mostrarTodosLosEdificios() {
            capaDinamica.clearLayers(); const marcs = [];
            for (const key in edificiosCampus) {
                const e = edificiosCampus[key];
                
                const iconoFinal = e.icon || '🏢';
                const claseIcono = key === 'entrada_alessandri' ? 'icono-mapa icono-verde' : 'icono-mapa';

                const m = L.marker([e.lat, e.lng], {icon: L.divIcon({html: iconoFinal, className: claseIcono, iconSize:[30,30]})}).addTo(capaDinamica);
                m.bindPopup(crearContenidoPopup(e.nombre, e.foto));
                marcs.push(m);
            }
            
            L.rectangle([[-33.4668, -70.5975], [-33.4671, -70.5969]], {color: "#28a745", weight: 2}).addTo(capaDinamica).bindPopup("Área de Parque");
            
            if(marcs.length > 0) map.fitBounds(new L.featureGroup(marcs).getBounds(), {padding: [50,50]});
        }

        function dibujarPuntos(datos, claseColor, msj, colorToast) {
            capaDinamica.clearLayers(); const marcs = [];
            datos.forEach(p => {
                let clase = claseColor; let est = p.estado === 'Fuera de Servicio' ? `<br><span class="badge bg-danger mt-1">🔴 Fuera de Servicio</span>` : (p.estado === 'Disponible' ? `<br><span class="badge bg-success mt-1">🟢 Operativo</span>` : '');
                clase += p.estado === 'Fuera de Servicio' ? ' icono-rojo' : (p.estado === 'Disponible' ? ' icono-verde' : '');
                const m = L.marker([p.lat, p.lng], {icon: L.divIcon({html: p.icono, className: `icono-mapa ${clase}`, iconSize:[36,36]})}).addTo(capaDinamica);
                m.bindPopup(`<div class="text-center"><b>${p.nombre}</b>${est}<br><small>${p.desc||''}</small></div>`); marcs.push(m);
            });
            if(marcs.length > 0) { map.flyToBounds(new L.featureGroup(marcs).getBounds(), {padding: [50,50], maxZoom: 19, duration: 1.2}); marcs[0].openPopup(); }
            mostrarToast(msj, colorToast);
        }

        function mostrarBanos() { dibujarPuntos(datosInfra.banios, 'icono-verde', 'Mostrando baños.', 'bg-info text-dark'); }
        function mostrarZonasTranquilas() { dibujarPuntos(datosInfra.zonasTranquilas, 'icono-verde', 'Zonas de descanso.', 'bg-success'); }

        function optimizarVozHumana() {
            const voces = window.speechSynthesis.getVoices();
            vozSeleccionada = voces.find(v => v.lang.includes('es') && (v.name.toLowerCase().includes('natural') || v.name.toLowerCase().includes('neural'))) || voces.find(v => v.lang.includes('es'));
        }
        
        function hablar(texto) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); const msj = new SpeechSynthesisUtterance(texto);
                if (vozSeleccionada) msj.voice = vozSeleccionada;
                msj.lang = 'es-CL'; msj.rate = 0.95; msj.pitch = 1.05; window.speechSynthesis.speak(msj);
            }
        }
        
        function leerPantalla() { hablar("Controles de accesibilidad activados."); }

        function toggleAscensorAdmin() {
            const asc = datosInfra.ascensores[0];
            asc.estado = asc.estado === 'Disponible' ? 'Fuera de Servicio' : 'Disponible';
            dibujarPuntos([asc], '', `Estado actualizado.`, asc.estado === 'Disponible' ? 'bg-success' : 'bg-danger');
        }

        function guardarFavorito() {
            const o = document.getElementById('origenRuta'), d = document.getElementById('destinoRuta');
            localStorage.setItem("favUTEM", `${edificiosCampus[o.value].nombre} ➡️ ${edificiosCampus[d.value].nombre}`);
            cargarFavoritos(); mostrarToast("Ruta guardada.", "bg-success");
        }
        
        function cargarFavoritos() {
            const fav = localStorage.getItem("favUTEM");
            if(fav) document.getElementById('listaFavoritos').innerHTML = `⭐ <b>Ruta Habitual:</b><br>${fav}`;
        }

        function enviarReporte() {
            bootstrap.Modal.getInstance(document.getElementById('modalReporte')).hide();
            document.getElementById('inputReporte').value = '';
            mostrarToast("Alerta enviada.", "bg-danger");
        }

        function mostrarToast(mensaje, colorClase) {
            const toast = document.getElementById('toastNotificacion');
            toast.className = `toast align-items-center border-0 shadow-lg ${colorClase}`;
            document.getElementById('toastMensaje').innerText = mensaje;
            new bootstrap.Toast(toast).show();
        }
    </script>
</body>
</html>
